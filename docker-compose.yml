services:
  happy-server:
    build:
      context: .
      dockerfile: Dockerfile.happy-server
    image: local/happy-server:compose
    init: true
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      SEED: ${SEED}
      HANDY_MASTER_SECRET: ${SEED}
      PUBLIC_URL: ${HAPPY_PUBLIC_URL}
      PORT: "3005"
      METRICS_ENABLED: "true"
      METRICS_PORT: "9090"
      DATA_DIR: /data
    ports:
      - "${HAPPY_BIND_ADDRESS:-127.0.0.1}:${HAPPY_PORT:-3005}:3005"
      - "${HAPPY_METRICS_BIND_ADDRESS:-127.0.0.1}:${HAPPY_METRICS_PORT:-9090}:9090"
    volumes:
      - happy_data:/data
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          node -e "fetch('http://127.0.0.1:3005/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 45s
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    command:
      - redis-server
      - --save
      - "60"
      - "1"
      - --appendonly
      - "yes"
    restart: unless-stopped
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    logging:
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  happy_data:
  postgres_data:
  redis_data:
